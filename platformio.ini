[platformio]
default_envs = esp12e
src_dir = .

[env:esp12e]
platform = espressif8266@2.6.3
board = esp12e
framework = arduino
lib_ldf_mode = deep+

build_flags = 
    -D PIO_FRAMEWORK_ARDUINO_LWIP2_LOW_MEMORY
    -I.
    -Isrc
    -fpermissive  # <-- Tambahkan ini untuk mengabaikan beberapa eror standar
