[env:esp12e]
platform = espressif8266@2.6.3
board = esp12e
framework = arduino
lib_ldf_mode = deep+
build_flags = 
    -D PIO_FRAMEWORK_ARDUINO_LWIP2_LOW_MEMORY
    -D LWIP_FEATURES=1
    -fpermissive
    -w
    -I.
    -I/home/runner/.platformio/packages/framework-arduinoespressif8266/tools/sdk/lwip2/include
