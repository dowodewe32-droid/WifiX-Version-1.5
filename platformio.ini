[platformio]
default_envs = esp12e
src_dir = .

[env:esp12e]
platform = espressif8266@2.6.3
board = esp12e
framework = arduino
lib_ldf_mode = deep+

build_flags = 
    -D PIO_FRAMEWORK_ARDUINO_LWIP2_LOW_MEMORY
    -D LWIP_FEATURES=1
    -D LWIP_IPV6=0
    -fpermissive
    -w
    -I.
    # Baris ini bakal nyari dhcpserver.h secara otomatis di semua folder tools SDK
    -I$PIOPACKAGES_DIR/framework-arduinoespressif8266/tools/sdk/lwip2/include
