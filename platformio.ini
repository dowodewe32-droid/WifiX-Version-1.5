[platformio]
default_envs = esp12e
src_dir = .

[env:esp12e]
# Pakai platform 2.4.0 karena kodingan WifiX/Deauther paling cocok di sini
platform = espressif8266@2.4.0
board = esp12e
framework = arduino
lib_ldf_mode = deep+
lib_deps = 
    Adafruit NeoPixel

build_flags = 
    -D PIO_FRAMEWORK_ARDUINO_LWIP2_LOW_MEMORY
    -D LWIP_FEATURES=1
    -fpermissive
    -w
    -I.
